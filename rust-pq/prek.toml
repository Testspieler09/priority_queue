[[repos]]
repo = "local"
hooks = [
    { id = "cargo-fmt", name = "cargo fmt check", entry = "cargo +nightly fmt -- --check", language = "system", pass_filenames = false },
    { id = "cargo-clippy", name = "cargo clippy", entry = "cargo clippy --all-targets -- -D warnings", language = "system", pass_filenames = false },
    { id = "cargo-check", name = "cargo check", entry = "cargo check --all-targets", language = "system", pass_filenames = false },
    { id = "cargo-test", name = "cargo test", entry = "cargo test --all", language = "system", pass_filenames = false }
]
